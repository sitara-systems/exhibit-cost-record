name: Deploy preview to GitHub Pages

# Interim preview deploy only (B2, Live Site Audit 2026-07-22): the
# production home for this site is sitara.systems/exhibit-cost-record/
# (folded in by the sitara-website repo's deploy.yml). This workflow
# publishes the same build to GitHub Pages at a *different* URL for early
# review, with NOINDEX=1 so the preview never gets indexed/cited in place
# of the eventual production URL. Same pattern as the Experiential Design
# Index's pages.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r site/requirements.txt
      - name: Build site
        working-directory: site
        env:
          SITE_URL: https://sitara-systems.github.io/exhibit-cost-record
          NOINDEX: "1"
        run: python build.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
